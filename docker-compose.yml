services:
  mail-agent:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./config:/app/config:ro
      - ./secrets:/app/secrets:ro
      - ./data/tokens:/app/data/tokens
      - ./data/state:/app/data/state
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "from pathlib import Path; raise SystemExit(0 if Path('/app/config/settings.yaml').exists() else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
  oauth-onboarding:
    build: .
    restart: unless-stopped
    env_file: .env
    command: ["python", "oauth_server.py"]
    ports:
      - "8080:8080"
    volumes:
      - ./config:/app/config:ro
      - ./secrets:/app/secrets
      - ./data/tokens:/app/data/tokens
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
