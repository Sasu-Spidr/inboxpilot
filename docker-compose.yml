services:
  mail-agent:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./config:/app/config:ro
      - ./secrets:/app/secrets:ro
      - ./data/tokens:/app/data/tokens
      - ./data/state:/app/data/state
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "from pathlib import Path; raise SystemExit(0 if Path('/app/config/settings.yaml').exists() else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
