À répondre:
  priority: 100
  description: "Définition : un humain identifiable attend une réponse écrite de ma part. Une réponse textuelle réglerait le mail. Inclut les relances où quelqu'un réclame un retour promis. Signaux : question directe, demande d'information ou de devis, sollicitation commerciale d'un prospect réel, message personnel appelant un retour, rappel dirigé vers moi. Ne pas confondre : facture, contrat ou accès où répondre ne suffit pas => À traiter ; expéditeur automatique même avec CTA => Notification ; mise au courant sans réponse attendue => À lire."
  action_hint: draft
  examples:
    - "Pouvez-vous me confirmer le devis ?"
    - "Avez-vous eu le temps de regarder ?"
    - "Je suis intéressé par vos services"

À traiter:
  priority: 90
  description: "Définition : le mail exige une action manuelle qui n'est pas une simple réponse : payer, signer, valider un document, gérer un accès ou un compte, effectuer une opération. Signaux : facture à régler, contrat à signer, document à valider, demande d'accès légitime, alerte de sécurité exigeant une action réelle. Ne pas confondre : simple question sur un document => À répondre ; reçu ou confirmation d'une opération déjà faite => Notification ; promo urgente déguisée => Commercial."
  action_hint: keep
  examples:
    - "Facture à régler"
    - "Document à signer"
    - "Mode de paiement à mettre à jour"

À lire:
  priority: 60
  description: "Définition : information destinée à un humain, à lire ou conserver, sans action attendue. Regroupe FYI, mises au courant, commentaires et mentions collaboratifs. Signaux : transfert pour info, note interne, mention dans un fil, commentaire sur un document, retour d'un collègue, document partagé sans demande. Ne pas confondre : message qui attend un retour => À répondre ; message généré par un système => Notification ; contenu éditorial d'abonnement ou promotion => Commercial."
  action_hint: keep
  examples:
    - "Pour info"
    - "Quelqu'un vous a mentionné"
    - "Commentaire sur un document"

Notification:
  priority: 40
  description: "Définition : message généré par une machine : alerte, code, confirmation transactionnelle, événement calendaire. Aucune action manuelle requise. Signaux : no-reply, notifications@, code de connexion, alerte système, reçu, invitation ou modification de réunion, rappel automatique. Ne pas confondre : alerte exigeant une action manuelle réelle => À traiter ; message écrit par un humain pour être lu => À lire ; promotion ou prospection => Commercial."
  action_hint: keep
  examples:
    - "Code à usage unique"
    - "Reçu de paiement"
    - "Invitation calendrier"

Commercial:
  priority: 20
  description: "Définition : contenu d'abonnement éditorial, promotion, prospection, publicité, offre commerciale, acquisition. Signaux : newsletter récurrente, cold email, promo/remise, argumentaire de vente, lien de désabonnement, envoi de masse. Ne pas confondre : mail transactionnel légitime d'un service utilisé => Notification ; message personnel ou professionnel individuel => À répondre ou À lire. Au moindre doute sur le caractère de masse ou commercial, ne choisis pas Commercial."
  action_hint: keep
  examples:
    - "Newsletter hebdomadaire"
    - "Offre spéciale"
    - "Prospection commerciale"
