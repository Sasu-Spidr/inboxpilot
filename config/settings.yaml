groq_api_key: ${GROQ_API_KEY}
groq_model: qwen/qwen3-32b
polling_interval_seconds: 60
max_emails_per_cycle: 20
token_encryption_key: ${TOKEN_ENCRYPTION_KEY}
state_file: ./data/state/processed_messages.enc
log_level: INFO
json_logs: true

clients:
  exuvie:
    enabled: true
    connectors:
      gmail:
        enabled: true
        accounts:
          - account: main
            credentials_file: ./secrets/exuvie/gmail-client-secret.json
            token_file: ./data/tokens/exuvie-gmail-main.token.enc
      hotmail:
        enabled: false
        accounts:
          - account: main
            client_id_env: EXUVIE_MICROSOFT_CLIENT_ID
            tenant_id: consumers
            token_file: ./data/tokens/exuvie-hotmail-main.token.enc
