groq_api_key: ${GROQ_API_KEY}
groq_model: qwen/qwen3-32b
polling_interval_seconds: 60
max_emails_per_cycle: 20
token_encryption_key: ${TOKEN_ENCRYPTION_KEY}
state_file: ./data/state/processed_messages.enc
log_level: INFO
json_logs: true

onboarding:
  registry_file: ./data/clients/clients.yaml
  gmail_credentials_file: ./secrets/google-oauth-client.json
  microsoft_client_id_env: MICROSOFT_CLIENT_ID

clients:
  exuvie:
    enabled: true
    owner_name: ""
    connectors:
      gmail:
        enabled: true
        accounts:
          - account: main
            sender_name: ""
            credentials_file: ./secrets/exuvie/gmail-client-secret.json
            token_file: ./data/tokens/exuvie-gmail-main.token.enc
      hotmail:
        enabled: false
        accounts:
          - account: main
            client_id_env: EXUVIE_MICROSOFT_CLIENT_ID
            tenant_id: consumers
            token_file: ./data/tokens/exuvie-hotmail-main.token.enc
  collegue:
    enabled: true
    owner_name: Collegue
    connectors:
      gmail:
        enabled: true
        accounts:
          - account: main
            sender_name: Collegue
            credentials_file: ./secrets/collegue/gmail-client-secret.json
            token_file: ./data/tokens/collegue-gmail-main.token.enc
      hotmail:
        enabled: false
        accounts:
          - account: main
            client_id_env: COLLEGUE_MICROSOFT_CLIENT_ID
            tenant_id: consumers
            token_file: ./data/tokens/collegue-hotmail-main.token.enc
